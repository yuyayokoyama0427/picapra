<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="160" fill="white" opacity="0.05"/>
  <circle cx="80" cy="560" r="200" fill="white" opacity="0.05"/>

  <!-- Left: mock screenshot card 1 -->
  <g transform="translate(80, 110)" filter="url(#shadow)">
    <rect width="340" height="260" rx="16" fill="url(#card1)" opacity="0.9"/>
    <!-- Browser chrome -->
    <rect width="340" height="36" rx="16" fill="rgba(0,0,0,0.15)"/>
    <rect x="0" y="20" width="340" height="16" fill="rgba(0,0,0,0.15)"/>
    <circle cx="20" cy="18" r="5" fill="#f87171"/>
    <circle cx="36" cy="18" r="5" fill="#fbbf24"/>
    <circle cx="52" cy="18" r="5" fill="#4ade80"/>
    <rect x="70" y="11" width="200" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
    <!-- Content placeholder -->
    <rect x="20" y="56" width="300" height="12" rx="6" fill="rgba(255,255,255,0.4)"/>
    <rect x="20" y="76" width="240" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="20" y="96" width="280" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="20" y="124" width="300" height="80" rx="10" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="216" width="120" height="28" rx="14" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Left: mock screenshot card 2 (offset) -->
  <g transform="translate(160, 290)" filter="url(#shadow2)">
    <rect width="300" height="220" rx="16" fill="url(#card2)" opacity="0.85"/>
    <rect x="20" y="20" width="260" height="12" rx="6" fill="rgba(255,255,255,0.4)"/>
    <rect x="20" y="40" width="200" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="20" y="68" width="260" height="100" rx="10" fill="rgba(255,255,255,0.2)"/>
    <circle cx="70" cy="185" r="20" fill="rgba(255,255,255,0.3)"/>
    <circle cx="120" cy="185" r="20" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Center: App name and tagline -->
  <text x="600" y="230" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="96" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">Picapra</text>
  <text x="600" y="300" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.85)" text-anchor="middle">スクリーンショットを美しく</text>

  <!-- Feature pills -->
  <g transform="translate(600, 360)">
    <!-- Pill 1 -->
    <rect x="-330" y="0" width="190" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>
    <text x="-235" y="28" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">🎨 グラデーション背景</text>
    <!-- Pill 2 -->
    <rect x="-110" y="0" width="170" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>
    <text x="-25" y="28" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">✨ 影・フレーム</text>
    <!-- Pill 3 -->
    <rect x="80" y="0" width="160" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>
    <text x="160" y="28" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">📥 PNG書き出し</text>
  </g>

  <!-- URL badge -->
  <rect x="460" y="450" width="280" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="476" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">picapra.vercel.app</text>
</svg>
